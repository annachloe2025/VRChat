<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="256" cy="220" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3a2360"/>
      <stop offset="60%" stop-color="#1c0e3a"/>
      <stop offset="100%" stop-color="#0a0418"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff5d8"/>
      <stop offset="55%" stop-color="#f5d76e"/>
      <stop offset="100%" stop-color="#c6962e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Background stars -->
  <g fill="#f5e6a8">
    <circle cx="78"  cy="92"  r="2.6" opacity="0.85"/>
    <circle cx="430" cy="118" r="1.8" opacity="0.65"/>
    <circle cx="455" cy="356" r="2.2" opacity="0.75"/>
    <circle cx="68"  cy="378" r="1.8" opacity="0.6"/>
    <circle cx="186" cy="58"  r="1.4" opacity="0.55"/>
    <circle cx="392" cy="446" r="1.4" opacity="0.55"/>
    <circle cx="120" cy="172" r="1.0" opacity="0.45"/>
    <circle cx="402" cy="248" r="1.0" opacity="0.45"/>
  </g>

  <!-- VRC text -->
  <text x="256" y="320"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="200"
        fill="url(#textGrad)"
        text-anchor="middle"
        letter-spacing="-2">VRC</text>

  <!-- Subtle horizon line -->
  <line x1="60" y1="448" x2="452" y2="448" stroke="#f5d76e" stroke-width="1" opacity="0.25"/>
</svg>
